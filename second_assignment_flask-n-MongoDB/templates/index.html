<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form style="max-width: 450px; margin: 40px auto; padding: 30px; background: #ffffff; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;" action="/submit" method="post">
    
    <h3 style="margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px;">Contact Details</h3>

    <div style="display: flex; gap: 15px; margin-bottom: 15px;">
        <div style="flex: 1;">
            <label for="fname" style="display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; text-transform: uppercase;">First Name</label>
            <input type="text" name="fname" id="fname" placeholder="FIrst Name" required 
                   style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; background: #fafafa;">
        </div>
        <div style="flex: 1;">
            <label for="lname" style="display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; text-transform: uppercase;">Last Name</label>
            <input type="text" name="lname" id="lname" placeholder="Last Name" 
                   style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; background: #fafafa;">
        </div>
    </div>

    <div style="margin-bottom: 15px;">
        <label for="email" style="display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; text-transform: uppercase;">Email Address</label>
        <input type="email" name="email" id="email" placeholder="Email ID"
               style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; background: #fafafa;">
    </div>

    <div style="margin-bottom: 25px;">
        <label for="mobile" style="display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; text-transform: uppercase;">Mobile Number</label>
        <input type="tel" name="mobile" id="mobile" placeholder="+91 123 456 7890" required 
               pattern="[0-9]{10,}" title="Please enter at least 10 digits"
               style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; background: #fafafa;">
    </div>

    <button type="submit" 
            style="width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);">
        Save Details
    </button>
</form>
</body>
</html>
